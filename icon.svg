<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#0a0908"/>
  <!-- Laurel wreath -->
  <g transform="translate(256,256)" fill="none" stroke="#c4a96c" stroke-width="3.5" stroke-linecap="round">
    <!-- Left branch -->
    <path d="M-10,80 Q-20,40 -18,0 Q-20,-40 -10,-80" stroke-width="4" opacity="0.3"/>
    <!-- Left leaves -->
    <ellipse cx="-38" cy="60" rx="18" ry="8" transform="rotate(-25,-38,60)" fill="#c4a96c" stroke="none" opacity="0.85"/>
    <ellipse cx="-48" cy="36" rx="20" ry="8" transform="rotate(-15,-48,36)" fill="#c4a96c" stroke="none" opacity="0.85"/>
    <ellipse cx="-52" cy="10" rx="21" ry="8" transform="rotate(-5,-52,10)" fill="#c4a96c" stroke="none" opacity="0.85"/>
    <ellipse cx="-50" cy="-16" rx="21" ry="8" transform="rotate(8,-50,-16)" fill="#c4a96c" stroke="none" opacity="0.85"/>
    <ellipse cx="-44" cy="-42" rx="20" ry="8" transform="rotate(18,-44,-42)" fill="#c4a96c" stroke="none" opacity="0.85"/>
    <ellipse cx="-34" cy="-64" rx="18" ry="8" transform="rotate(30,-34,-64)" fill="#c4a96c" stroke="none" opacity="0.85"/>
    <!-- Right branch -->
    <path d="M10,80 Q20,40 18,0 Q20,-40 10,-80" stroke-width="4" opacity="0.3"/>
    <!-- Right leaves -->
    <ellipse cx="38" cy="60" rx="18" ry="8" transform="rotate(25,38,60)" fill="#c4a96c" stroke="none" opacity="0.85"/>
    <ellipse cx="48" cy="36" rx="20" ry="8" transform="rotate(15,48,36)" fill="#c4a96c" stroke="none" opacity="0.85"/>
    <ellipse cx="52" cy="10" rx="21" ry="8" transform="rotate(5,52,10)" fill="#c4a96c" stroke="none" opacity="0.85"/>
    <ellipse cx="50" cy="-16" rx="21" ry="8" transform="rotate(-8,50,-16)" fill="#c4a96c" stroke="none" opacity="0.85"/>
    <ellipse cx="44" cy="-42" rx="20" ry="8" transform="rotate(-18,44,-42)" fill="#c4a96c" stroke="none" opacity="0.85"/>
    <ellipse cx="34" cy="-64" rx="18" ry="8" transform="rotate(-30,34,-64)" fill="#c4a96c" stroke="none" opacity="0.85"/>
  </g>
  <!-- A letter -->
  <text x="256" y="280" text-anchor="middle" font-family="Georgia,serif" font-weight="600" font-size="120" fill="#e8dfd3" letter-spacing="-2">A</text>
</svg>
