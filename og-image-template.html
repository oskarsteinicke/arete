<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap');
  body {
    width: 1200px;
    height: 630px;
    background: #0a0908;
    font-family: 'Inter', system-ui, sans-serif;
    overflow: hidden;
    position: relative;
  }
  .glow {
    position: absolute;
    top: -100px;
    left: 50%;
    transform: translateX(-50%);
    width: 700px;
    height: 500px;
    background: radial-gradient(ellipse, rgba(154,130,86,0.15) 0%, transparent 65%);
    pointer-events: none;
  }
  .glow2 {
    position: absolute;
    bottom: -150px;
    right: -100px;
    width: 500px;
    height: 500px;
    background: radial-gradient(ellipse, rgba(154,130,86,0.08) 0%, transparent 65%);
    pointer-events: none;
  }
  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    padding: 60px 80px;
  }
  .logo-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 36px;
  }
  .logo-icon {
    width: 52px;
    height: 52px;
    border-radius: 12px;
  }
  .logo-text {
    font-family: 'Cinzel', Georgia, serif;
    font-size: 32px;
    color: #c8a96e;
    letter-spacing: 0.12em;
  }
  h1 {
    font-family: 'Cinzel', Georgia, serif;
    font-size: 52px;
    color: #f0ece4;
    line-height: 1.15;
    margin-bottom: 20px;
    letter-spacing: 0.5px;
    font-weight: 500;
  }
  h1 em {
    font-style: italic;
    font-family: 'Playfair Display', Georgia, serif;
    color: #c8a96e;
  }
  p {
    font-size: 20px;
    color: #a09880;
    line-height: 1.6;
    max-width: 700px;
    margin-bottom: 32px;
  }
  .pills {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .pill {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 100px;
    padding: 8px 20px;
    font-size: 14px;
    color: #a09880;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .pill span { font-size: 16px; }
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #9a8256, #c8a96e, #e8c97e, #c8a96e, #9a8256);
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="glow2"></div>
  <div class="content">
    <div class="logo-row">
      <img class="logo-icon" src="icon-192.png" alt="Arete">
      <div class="logo-text">Arete</div>
    </div>
    <h1>Habits. Workouts. Nutrition.<br>All in one free app.</h1>
    <p>Track everything, stay consistent, and level up. No subscriptions, no account required.</p>
    <div class="pills">
      <div class="pill"><span>✅</span> Habits</div>
      <div class="pill"><span>🏋️</span> Workouts</div>
      <div class="pill"><span>🥗</span> Nutrition</div>
      <div class="pill"><span>🤖</span> AI Coach</div>
      <div class="pill"><span>⚔️</span> XP & Levels</div>
    </div>
  </div>
  <div class="bottom-bar"></div>
</body>
</html>
