<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0908">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Northstar">
  <title>Northstar</title>
  <link rel="manifest" href="manifest.json">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-4NQYVJR5S2"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-4NQYVJR5S2');
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app" role="application" aria-label="Northstar lifestyle tracker">
  <main class="view" id="view" role="main" aria-live="polite"></main>
  <!-- AI Coach -->
  <div id="coach-overlay" class="coach-overlay coach-hidden" role="dialog" aria-label="AI Coach" aria-modal="true">
    <div class="coach-panel">
      <div class="coach-hdr">
        <div class="coach-hdr-title"><span class="coach-star">✦</span> Northstar Coach</div>
        <div style="display:flex;gap:6px;align-items:center">
          <button class="coach-hdr-btn" onclick="clearCoachHistory()" title="New conversation" aria-label="Clear conversation">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
          </button>
          <button class="coach-hdr-btn" onclick="closeCoach()" aria-label="Close coach">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>
      <div class="coach-msgs" id="coach-msgs" role="log" aria-label="Coach messages"></div>
      <div class="coach-input-wrap">
        <textarea class="coach-input" id="coach-input" placeholder="Ask your coach anything…" rows="1" aria-label="Message to coach"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendCoachMsg()}"
          oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
        <button class="coach-send" id="coach-send-btn" onclick="sendCoachMsg()" aria-label="Send message">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>
  <button class="coach-fab" id="coach-fab" onclick="openCoach()" aria-label="Open AI Coach">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
  </button>

  <nav id="nav" role="navigation" aria-label="Main navigation">
    <button class="ni active" data-n="home" onclick="go('home')" aria-label="Home">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      Home
    </button>
    <button class="ni" data-n="habits" onclick="go('habits')" aria-label="Habits">
      <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      Habits
    </button>
    <button class="ni" data-n="workout" onclick="go('workout')" aria-label="Workout">
      <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Workout
    </button>
    <button class="ni" data-n="diet" onclick="go('diet')" aria-label="Diet">
      <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
      Diet
    </button>
    <button class="ni" data-n="library" onclick="go('library')" aria-label="Library">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
      Library
    </button>
    <button class="ni" data-n="stats" onclick="go('stats')" aria-label="Profile">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Profile
    </button>
  </nav>
</div>
<script src="data.js?v=26"></script>
<script src="app.js?v=26"></script>
<script src="workout.js?v=26"></script>
<script src="diet.js?v=26"></script>
<script src="coach.js?v=26"></script>
<script src="social.js?v=26"></script>
<script src="profile.js?v=26"></script>
<script>
  if ('serviceWorker' in navigator) {
    // Purge ALL old caches on load to ensure fresh files
    caches.keys().then(ks => ks.filter(k => k !== 'ns-v26').forEach(k => caches.delete(k)));
    navigator.serviceWorker.register('/northstar/service-worker.js').then(reg => {
      reg.update();
    });
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      window.location.reload();
    });
  }
</script>
</body>
</html>
